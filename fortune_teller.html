            padding: 0;

            color: #a0a0a0;

            text-align: center;

            transition: all 0.3s ease;
            position: relative;

            border-color: #ffd700;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
        }

        .fortune-card::before {

            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .fortune-card:hover::before {
            opacity: 1;
        }

        .fortune-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .fortune-card h3 {
            font-size: 1.5em;
            margin-bottom: 10px;

        }

        .fortune-card p {

        .tarot-card-inner {

        .tarot-card.flipped .tarot-card-inner {

        }

        .tarot-card-front, .tarot-card-back {

            width: 100%;
            height: 100%;

            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            }

            }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;

            width: 50px;

            border-radius: 50%;

            to { transform: rotate(360deg); }
        }

            color: #ffd700;
